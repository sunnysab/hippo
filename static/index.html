<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hippo</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/common.css">
  <link rel="stylesheet" href="/groups.css">
  <link rel="stylesheet" href="/articles.css">
  <link rel="stylesheet" href="/settings.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">H</span>
        <div class="brand-text">
          <div class="brand-title">Hippo</div>
          <div class="brand-subtitle" data-i18n="brand.subtitle">WeChat Article Studio</div>
        </div>
      </div>
      <nav class="tabs" role="tablist">
        <button class="tab is-active" data-tab="groups" data-i18n="nav.groups">Groups</button>
        <button class="tab" data-tab="articles" data-i18n="nav.articles">Articles</button>
        <button class="tab" data-tab="settings" data-i18n="nav.sync">Settings</button>
      </nav>
      <div class="top-actions">
        <div class="top-meta" id="last-login-info"></div>
        <div class="top-meta" id="last-sync-info"></div>
        <button class="btn ghost" id="btn-refresh" type="button">
          <span class="icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12a8 8 0 0 1 13.66-5.66L20 4v6h-6l2.44-2.44A6 6 0 1 0 18 12h2a8 8 0 0 1-16 0z"/></svg>
          </span>
          <span data-i18n="actions.refresh">Refresh</span>
        </button>
      </div>
    </header>

    <main class="content">
      <div id="status-banner" class="banner is-hidden">
        <div class="banner-text" id="banner-text"></div>
        <button class="btn ghost" id="btn-banner-login" type="button" data-i18n="login.relogin">Re-login</button>
      </div>
      <div id="view-root"></div>
    </main>

    <div class="toast is-hidden" id="app-toast"></div>
  </div>
  <script src="/app.js"></script>
  <script src="/groups.js"></script>
  <script src="/articles_facets.js"></script>
  <script src="/articles.js"></script>
  <script src="/settings.js"></script>
</body>
</html>
