<section id="view-articles" class="view">
  <div class="article-layout">
    <div class="panel article-list">
      <div class="panel-header article-sidebar-header">
        <div>
          <div class="section-kicker" data-i18n="articles.libraryKicker">Articles</div>
          <h2 data-i18n="articles.title">Articles</h2>
          <p class="muted" data-i18n="articles.librarySubtitle">Browse synced articles by group, account, and type.</p>
        </div>
        <div class="toolbar article-sidebar-actions">
          <button class="btn ghost article-mobile-toggle" id="btn-article-filter-toggle" type="button" data-i18n="articles.toggleFilters">筛选</button>
          <button class="btn ghost article-reset-btn" id="btn-article-reset" type="button" data-i18n="articles.resetFilters">Reset Filters</button>
        </div>
      </div>
      <div class="article-filter-shell" id="article-filter-shell">
        <div class="article-filter-stack">
          <div class="toolbar article-filter-grid article-filter-grid-top">
            <select id="article-group-filter"></select>
            <select id="article-account-filter"></select>
          </div>
          <div class="toolbar article-filter-grid article-filter-grid-middle">
            <select id="article-type-filter">
              <option value="" data-i18n="filters.allTypes">All Types</option>
              <option value="0" data-i18n="articles.type.0">Regular Article</option>
              <option value="5" data-i18n="articles.type.5">Video Share</option>
              <option value="6" data-i18n="articles.type.6">Music Share</option>
              <option value="7" data-i18n="articles.type.7">Audio Share</option>
              <option value="8" data-i18n="articles.type.8">Picture Share</option>
              <option value="10" data-i18n="articles.type.10">Text Share</option>
              <option value="11" data-i18n="articles.type.11">Article Share</option>
              <option value="17" data-i18n="articles.type.17">Short Post</option>
            </select>
            <select id="article-sort">
              <option value="publish_at_desc" data-i18n="filters.sortPublishedDesc">Published (Newest)</option>
              <option value="relevance_desc" data-i18n="filters.sortRelevanceDesc">Relevance</option>
            </select>
          </div>
          <div class="toolbar article-filter-grid article-filter-grid-bottom">
            <div class="input article-search-input">
              <input type="search" id="article-search" placeholder="Search" data-i18n-placeholder="filters.search">
              <span class="icon">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79L20 21.5 21.5 20l-6-6zm-5.5 0a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
              </span>
            </div>
            <div class="article-filter-summary" id="article-filter-summary"></div>
          </div>
          <div class="article-type-facets" id="article-type-facets"></div>
        </div>
      </div>
      <div class="loading-inline loading-center is-hidden" id="article-search-loading" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span data-i18n="common.loading">Loading...</span>
      </div>
      <div class="loading-inline loading-center is-hidden" id="article-list-loading" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span data-i18n="common.loading">Loading...</span>
      </div>
      <div class="article-list-scroll" id="article-list"></div>
      <div class="panel-footer">
        <button class="btn ghost" id="btn-article-more" type="button" data-i18n="articles.loadMore">Load More</button>
      </div>
    </div>

    <div class="article-resizer" id="article-resizer" role="separator" aria-orientation="vertical"></div>

    <div class="panel article-preview">
      <div class="panel-header article-preview-topbar">
        <div>
          <div class="section-kicker" data-i18n="articles.previewKicker">Preview</div>
          <h2 data-i18n="articles.previewTitle">Article Preview</h2>
          <p class="muted" data-i18n="articles.previewSubtitle">Review article details and adjust the reading layout.</p>
        </div>
        <div class="toolbar article-preview-toolbar">
          <button class="btn ghost article-mobile-back" id="btn-article-mobile-back" type="button" data-i18n="articles.backToList">Back to list</button>
          <button class="btn ghost article-toolbar-btn" id="btn-article-open-original" type="button" data-i18n="articles.menu.openOriginal">Open original</button>
          <button class="btn ghost article-toolbar-btn" id="btn-article-copy-link" type="button" data-i18n="articles.menu.copyLink">Copy link</button>
          <button class="icon-btn" id="reader-copy" type="button" aria-label="Copy article text" title="Copy article text">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </span>
          </button>
          <button class="icon-btn" id="reader-toggle" type="button" aria-label="Typography settings" title="Typography settings">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h16v2H4zM4 16h16v2H4z"/></svg>
            </span>
          </button>
          <button class="icon-btn" id="btn-article-toggle" type="button" aria-label="Toggle list" title="Toggle list">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h10v2H4zM4 16h16v2H4z"/></svg>
            </span>
          </button>
        </div>
      </div>
      <div class="reader-controls is-hidden" id="reader-controls">
        <label>
          <span data-i18n="reader.width">Width</span>
          <input id="reader-width" type="range" min="400" max="1200" step="10" value="860">
        </label>
        <label>
          <span data-i18n="reader.font">Font Size</span>
          <input id="reader-font" type="range" min="12" max="32" step="1" value="17">
        </label>
        <label>
          <span data-i18n="reader.lineHeight">Line Height</span>
          <input id="reader-line" type="range" min="1.2" max="3.0" step="0.05" value="1.8">
        </label>
        <label>
          <span data-i18n="reader.letter">Letter Spacing</span>
          <input id="reader-letter" type="range" min="0" max="4" step="0.1" value="0.2">
        </label>
        <label class="switch">
          <input id="reader-serif" type="checkbox">
          <span data-i18n="reader.serif">Serif Font</span>
        </label>
        <label class="switch">
          <input id="reader-hide-small-images" type="checkbox">
          <span data-i18n="reader.hideSmallImages">Hide Small Images</span>
        </label>
      </div>
      <div class="article-preview-body" id="article-preview">
        <div class="empty-state" data-i18n="articles.empty">Select an article to preview.</div>
      </div>
    </div>
  </div>
</section>

<div class="context-menu is-hidden" id="article-context-menu">
  <button class="context-item" id="article-menu-open" type="button" data-i18n="articles.menu.openOriginal">Open original</button>
  <button class="context-item" id="article-menu-copy" type="button" data-i18n="articles.menu.copyLink">Copy link</button>
</div>

<div class="context-menu is-hidden" id="article-image-context-menu">
  <button class="context-item" id="article-image-menu-block" type="button" data-i18n="articles.menu.blockImage">Block image</button>
</div>
