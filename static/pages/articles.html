<section id="view-articles" class="view">
  <div class="article-layout">
    <div class="panel article-list">
      <div class="panel-header" style="display: block;">
        <div style="width: 100%; max-width: 80%; min-width: 200px; margin: 0 auto;">
          <div class="toolbar" style="display: grid; grid-template-columns: 4fr 6fr; gap: 8px; margin-bottom: 8px;">
            <select id="article-group-filter" style="width: 100%; min-width: 0;"></select>
            <select id="article-account-filter" style="width: 100%; min-width: 0;"></select>
          </div>
          <div class="input" style="width: 100%;">
            <input type="search" id="article-search" placeholder="Search" data-i18n-placeholder="filters.search" style="width: 100%; border-color: #d1d5db;">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79L20 21.5 21.5 20l-6-6zm-5.5 0a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
            </span>
          </div>
        </div>
      </div>
      <div class="loading-inline loading-center is-hidden" id="article-search-loading" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <span data-i18n="common.loading">Loading...</span>
      </div>
      <div class="article-list-scroll" id="article-list"></div>
      <div class="panel-footer">
        <button class="btn ghost" id="btn-article-more" type="button" data-i18n="articles.loadMore">Load More</button>
      </div>
    </div>

    <div class="article-resizer" id="article-resizer" role="separator" aria-orientation="vertical"></div>

    <div class="panel article-preview">
      <div class="panel-header">
        <div></div>
        <div class="toolbar">
          <button class="icon-btn" id="btn-article-toggle" type="button" aria-label="Toggle list" title="Toggle list">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h10v2H4zM4 16h16v2H4z"/></svg>
            </span>
          </button>
        </div>
      </div>
      <div class="reader-controls is-hidden" id="reader-controls">
        <label>
          <span data-i18n="reader.width">Width</span>
          <input id="reader-width" type="range" min="400" max="1200" step="10" value="860">
        </label>
        <label>
          <span data-i18n="reader.font">Font Size</span>
          <input id="reader-font" type="range" min="12" max="32" step="1" value="17">
        </label>
        <label>
          <span data-i18n="reader.lineHeight">Line Height</span>
          <input id="reader-line" type="range" min="1.2" max="3.0" step="0.05" value="1.8">
        </label>
        <label>
          <span data-i18n="reader.letter">Letter Spacing</span>
          <input id="reader-letter" type="range" min="0" max="4" step="0.1" value="0.2">
        </label>
        <label class="switch">
          <input id="reader-serif" type="checkbox">
          <span data-i18n="reader.serif">Serif Font</span>
        </label>
        <label class="switch">
          <input id="reader-hide-small-images" type="checkbox">
          <span data-i18n="reader.hideSmallImages">Hide Small Images</span>
        </label>
      </div>
      <button class="reader-fab" id="reader-toggle" type="button" aria-label="排版设置" title="排版设置">
        <span class="icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16v2H4zM4 11h16v2H4zM4 16h16v2H4z"/></svg>
        </span>
      </button>
      <div class="article-preview-body" id="article-preview">
        <div class="empty-state" data-i18n="articles.empty">Select an article to preview.</div>
      </div>
    </div>
  </div>
</section>

<div class="context-menu is-hidden" id="article-context-menu">
  <button class="context-item" id="article-menu-open" type="button" data-i18n="articles.menu.openOriginal">Open original</button>
  <button class="context-item" id="article-menu-copy" type="button" data-i18n="articles.menu.copyLink">Copy link</button>
</div>
