<section id="view-groups" class="view is-active">
  <div class="groups-layout">
    <div class="panel">
      <div class="panel-header">
        <div>
          <h2 data-i18n="groups.title">Groups</h2>
          <p class="muted" data-i18n="groups.subtitle">Organize accounts into focused collections.</p>
        </div>
        <button class="btn" id="btn-group-create" type="button" aria-label="Create group" title="Create group">
          <span class="icon">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v14h-2zM5 11h14v2H5z"/></svg>
          </span>
        </button>
      </div>
      <div class="list" id="group-list"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div>
          <div class="group-headline">
            <button class="group-name" id="group-current-name" type="button" data-i18n="groups.currentTitle">Group</button>
            <button class="group-id" id="group-current-id" type="button" data-i18n="groups.currentId">ID</button>
          </div>
          <p class="muted" id="group-current-meta" data-i18n="groups.currentSubtitle">Select a group.</p>
        </div>
        <div class="toolbar group-actions">
          <div class="input">
            <input type="search" id="account-search" placeholder="Search" data-i18n-placeholder="filters.search">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79L20 21.5 21.5 20l-6-6zm-5.5 0a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
            </span>
          </div>
          <button class="btn ghost" id="btn-account-add" type="button">
            <span class="icon">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 5h2v14h-2zM5 11h14v2H5z"/></svg>
            </span>
            <span data-i18n="accounts.add">Add Account</span>
          </button>
          <button class="btn ghost" id="btn-group-rename" type="button" data-i18n="groups.rename">Rename</button>
          <button class="btn ghost" id="btn-group-delete" type="button" data-i18n="groups.delete">Delete</button>
        </div>
      </div>
      <div class="toolbar group-sync-toolbar">
        <span class="muted" data-i18n="groups.syncDefault">Default sync</span>
        <select id="group-sync-mode"></select>
        <input type="number" id="group-sync-days" min="1" />
      </div>
      <div class="toolbar accounts-toolbar">
        <label class="switch inline">
          <input type="checkbox" id="account-select-all" />
          <span data-i18n="accounts.selectAll">Select All</span>
        </label>
        <div class="batch-actions is-hidden" id="batch-actions">
          <select id="batch-group-select"></select>
          <button class="btn ghost" id="btn-batch-move" type="button" data-i18n="accounts.move">Move</button>
          <div class="batch-divider"></div>
          <select id="batch-sync-mode"></select>
          <input type="number" id="batch-sync-days" min="1" />
          <button class="btn ghost" id="btn-batch-sync" type="button" data-i18n="accounts.batchSyncApply">Apply</button>
          <div class="batch-divider"></div>
          <button class="btn ghost" id="btn-batch-group-sync" type="button" data-i18n="accounts.groupSync">Sync</button>
        </div>
        <span class="badge" id="batch-count">0</span>
        <button class="btn ghost" id="btn-account-refresh" type="button">
          <span data-i18n="actions.refresh">Refresh</span>
        </button>
      </div>
      <div class="card-grid" id="account-list"></div>
    </div>
  </div>
</section>

<div class="modal-overlay is-hidden" id="account-search-modal">
  <div class="modal search-modal">
    <div class="modal-header">
      <div class="modal-title" data-i18n="accounts.searchTitle">Add Account</div>
      <button class="icon-btn" id="btn-account-search-close" type="button" aria-label="Close">
        <span class="icon">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.3 5.7 12 12l6.3 6.3-1.4 1.4L10.6 13.4 4.3 19.7 2.9 18.3 9.2 12 2.9 5.7 4.3 4.3l6.3 6.3 6.3-6.3z"/></svg>
        </span>
      </button>
    </div>
    <div class="input modal-search">
      <input type="search" id="account-search-input" placeholder="Search accounts" data-i18n-placeholder="accounts.searchPlaceholder">
      <span class="icon">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6 6 0 1 0 14 15.5l.27.28v.79L20 21.5 21.5 20l-6-6zm-5.5 0a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
      </span>
    </div>
    <div class="search-results is-hidden" id="account-search-results"></div>
  </div>
</div>

<div class="context-menu is-hidden" id="group-context-menu">
  <button class="context-item" id="group-menu-rss" type="button">RSS</button>
</div>
