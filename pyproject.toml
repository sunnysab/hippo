[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "wechatcli"
version = "0.1.0"
description = "WeChat article exporter CLI"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [{name = "wechatcli"}]
keywords = ["wechat", "cli", "exporter"]
classifiers = [
  "Programming Language :: Python :: 3",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
]
dependencies = [
  "typer==0.12.5",
  "httpx[http2]==0.27.2",
  "beautifulsoup4==4.12.3",
  "markdownify==0.13.1",
  "platformdirs==4.3.6",
  "psycopg2-binary==2.9.11",
  "tqdm==4.66.4",
]

[project.scripts]
wechatcli = "wechatcli.cli:app"

[tool.setuptools]
py-modules = ["normalize_html", "__init__"]
packages = ["wechatcli"]
